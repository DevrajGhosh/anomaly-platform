# render.yaml
services:
  # ── FastAPI Web Service ─────────────────────────────────────────────────
  - type: web
    name: anomaly-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port 8000
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_SYNC_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "False"
    healthCheckPath: /health

  # ── Celery Background Worker ────────────────────────────────────────────
  - type: worker
    name: anomaly-celery
    runtime: docker
    dockerfilePath: ./Dockerfile
    startCommand: celery -A app.workers.celery_app worker --loglevel=info --pool=solo
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_SYNC_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "False"